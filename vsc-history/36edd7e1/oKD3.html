<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

  <body>
    <h1>Formulario de Registro</h1>

    <form action="" method="get">
      <label for="nombre">Nombre:</label> <input type="text" name="nombre" id="nombre" maxlength="50" />
      <br />
      <br />
      <label for="apellidos"> Apellidos: </label><input type="text" name="apellidos" id="apellidos" maxlength="50" />
      <br />
      <br />
      Sexo: <input type="radio" name="hombre" value="1" id="hombre"/><label for="hombre">Hombre</label> 
      <input type="radio" name="mujer" value="2" id="mujer"/><label for="mujer">Mujer</label>
      <br />
      <br />
      <label for="correo">Correo: </label><input type="text" name="correo" id="correo"/>
      <br />
      <br />
        <select name="ciudades" id="ciudades">
            <option value="alicante">Alicante</option>
            <option value="madrid">Madrid</option>
            <option value="sevilla">Sevilla</option>
            <option value="valencia">Valencia</option>
        </select>
      <br>
      <br>

<label for="descripcion">Descripción: </label><textarea name="descripcion" id="descripcion" rows="5" cols="100"> </textarea>

      <br>
      <br>
    
      <input type="checkbox" name="acepta1" id="acepta1"/> <label for="acepta1">Deseo recibir información de
        novedades y ofertas</label>
      <br />
      <input type="checkbox" name="acepta2" checked id="acepta2"/> <label for="acepta2">Declaro haber leído los
        términos y condiciones</label>
      <br />
      <br />
      <input type="submit" value="Enviar" />
    </form>
  </body>
