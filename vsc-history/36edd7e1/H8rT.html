<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicios</title>
  </head>
  <body>
    <h1>Formulario de Registro</h1>

    <form action="" method="get">
      <label for="nombre"> Nombre: <input type="text" name="nombre" maxlength="50" /></label>
      <br />
      <br />
      Apellidos: <input type="text" name="apellidos" maxlength="50" />
      <br />
      <br />
      Sexo: <input type="radio" name="hombre" value="1" />Hombre
      <input type="radio" name="mujer" value="2" />Mujer
      <br />
      <br />
      Correo: <input type="text" name="correo" />
      <br />
      <br />
        <select name="ciudades" id="ciudades">
            <option value="alicante">Alicante</option>
            <option value="madrid">Madrid</option>
            <option value="sevilla">Sevilla</option>
            <option value="valencia">Valencia</option>
        </select>
      <br>
      <br>

Descripción: <textarea name="descripcion" rows="5" cols="100"> </textarea>

      <br>
      <br>
    
      <input type="checkbox" name="acepta1" /> Deseo recibir información de
      novedades y ofertas
      <br />
      <input type="checkbox" name="acepta2" checked /> Declaro haber leído los
      términos y condiciones
      <br />
      <br />
      <input type="submit" value="Enviar" />
    </form>
  </body>
</html>
